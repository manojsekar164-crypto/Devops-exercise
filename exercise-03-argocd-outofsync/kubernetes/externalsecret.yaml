apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-db-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: payment-db-secret
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/payment/secrets
        property: DB_PASSWORD

