apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: exercise-03-argocd-outofsync-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tharaneshtharanesh431-design/DevOps_26_Exercises.git
    targetRevision: HEAD
    path: exercise-03-argocd-outofsync/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
