apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: default
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/version: "2.0.0" # Safe to update
spec:
  replicas: 3
  # FIX: Keep the selector immutable matchLabels constant
  selector:
    matchLabels:
      app: payment # Kept from version 1 to prevent immutable field errors
  template:
    metadata:
      labels:
        app: payment
        version: payment-v2 # Safe to change pod labels here to trigger rollout
    spec:
      containers:
        - name: payment-service
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/payment-service:v2.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
