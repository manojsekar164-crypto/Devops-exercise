apiVersion: v1
kind: Pod
metadata:
  name: dynamo-client-pod
  namespace: default
  labels:
    app: dynamo-client
    app.kubernetes.io/name: dynamo-client
spec:
  # FIX: Reference the ServiceAccount configured with IRSA
  serviceAccountName: dynamo-reader-sa
  containers:
    - name: app
      image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/customer-service:v1.1.0
      ports:
        - containerPort: 8080
      env:
        - name: AWS_REGION
          value: ap-south-1
        - name: DYNAMODB_TABLE
          value: customer-data
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        capabilities:
          drop:
            - ALL
