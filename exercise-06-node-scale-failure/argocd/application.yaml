apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: exercise-06-node-scale-failure-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tharaneshtharanesh431-design/DevOps_26_Exercises.git
    targetRevision: HEAD
    path: exercise-06-node-scale-failure/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
