apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: exercise-24-dynamodb-application-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tharaneshtharanesh431-design/DevOps_26_Exercises.git
    targetRevision: HEAD
    path: exercise-24-dynamodb-application/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
