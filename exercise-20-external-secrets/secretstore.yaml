apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: default
  labels:
    app.kubernetes.io/name: aws-secretsmanager-store
    app.kubernetes.io/component: credential-management
    app.kubernetes.io/part-of: payment-system
spec:
  provider:
    aws:
      service: SecretsManager
      # Using the standard region; customize as required
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
