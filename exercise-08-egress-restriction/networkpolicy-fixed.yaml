apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payment-service-egress-policy
  namespace: default
  labels:
    app.kubernetes.io/name: payment-service-egress-policy
    app.kubernetes.io/part-of: payment-system
spec:
  podSelector:
    matchLabels:
      app: payment-service
  policyTypes:
    - Egress
  egress:
    # Rule 1: Allow DNS resolution (CoreDNS) inside the cluster
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Rule 2: Allow HTTPS egress to the internet and AWS APIs (DynamoDB)
    - to:
        # Empty ipBlock targets all IPs. In production, restrict to AWS CIDR ranges or Prefix Lists.
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
