apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: default
  annotations:
    # FIX: Enable Stakater Reloader to watch secret changes and trigger rolling restart
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: payment-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/payment-service:v1.0.0
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-db-secret
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
