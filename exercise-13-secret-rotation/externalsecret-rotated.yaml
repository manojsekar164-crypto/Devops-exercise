apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-db-externalsecret
  namespace: default
  labels:
    app.kubernetes.io/name: payment-db-externalsecret
    app.kubernetes.io/part-of: payment-system
spec:
  # FIX: Shortened sync interval to automatically pull rotated credentials
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: payment-db-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/payment/secrets
        property: DB_PASSWORD
